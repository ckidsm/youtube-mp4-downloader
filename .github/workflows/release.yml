name: Build & Release

# v로 시작하는 태그(예: v1.0.0)를 푸시하면 3개 OS 바이너리를 빌드해
# GitHub Release에 자동으로 첨부합니다. Actions 탭에서 수동 실행(workflow_dispatch)도 가능합니다.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            asset: YoutubeDownloader-windows.zip
          - os: macos-14
            label: macos-arm64
            asset: YoutubeDownloader-macos-arm64.zip
          - os: ubuntu-22.04
            label: linux
            asset: YoutubeDownloader-linux.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Linux 런너에서 PyQt6(Qt xcb 플러그인) 빌드에 필요한 시스템 라이브러리
      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-xinerama0

      # macOS는 .app 번들 생성을 위해 spec 파일 사용
      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller youtube_downloader.spec

      # Windows: onefile .exe (add-data 구분자는 ';')
      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          pyinstaller --onefile --windowed --name YoutubeDownloader
          --add-data "youtube_worker.py;."
          --add-data "dependency_checker.py;."
          --hidden-import PyQt6.QtCore
          --hidden-import PyQt6.QtGui
          --hidden-import PyQt6.QtWidgets
          --hidden-import yt_dlp
          --hidden-import yt_dlp.extractor
          --hidden-import yt_dlp.postprocessor
          --hidden-import dependency_checker
          --hidden-import youtube_worker
          youtube_ui.py

      # Linux: onefile 실행 파일 (add-data 구분자는 ':')
      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: >
          pyinstaller --onefile --windowed --name YoutubeDownloader
          --add-data "youtube_worker.py:."
          --add-data "dependency_checker.py:."
          --hidden-import PyQt6.QtCore
          --hidden-import PyQt6.QtGui
          --hidden-import PyQt6.QtWidgets
          --hidden-import yt_dlp
          --hidden-import yt_dlp.extractor
          --hidden-import yt_dlp.postprocessor
          --hidden-import dependency_checker
          --hidden-import youtube_worker
          youtube_ui.py

      # macOS: ffmpeg/AtomicParsley를 앱 번들에 포함(없으면 첫 실행 시 자동 다운로드되므로 실패해도 무방)
      - name: Bundle macOS binaries
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg atomicparsley || true
          BIN_DIR="dist/YoutubeDownloader.app/Contents/MacOS/bin"
          mkdir -p "$BIN_DIR"
          [ -x "$(command -v ffmpeg)" ] && cp "$(command -v ffmpeg)" "$BIN_DIR/" || true
          [ -x "$(command -v AtomicParsley)" ] && cp "$(command -v AtomicParsley)" "$BIN_DIR/" || true
          chmod -R 755 "$BIN_DIR" || true
          # 서명 안 된 앱의 quarantine 속성 제거
          xattr -cr "dist/YoutubeDownloader.app" || true

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/YoutubeDownloader.exe -DestinationPath ${{ matrix.asset }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          # -y: 심볼릭 링크 보존(.app 번들 무결성 유지)
          zip -ry "../${{ matrix.asset }}" YoutubeDownloader.app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x dist/YoutubeDownloader
          tar -czvf "${{ matrix.asset }}" -C dist YoutubeDownloader

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## YouTube MP4 Downloader ${{ github.ref_name }}

            아래 파일 중 사용하는 OS에 맞는 것을 내려받아 압축을 풀고 실행하세요.

            | OS | 파일 | 실행 방법 |
            |----|------|-----------|
            | Windows | `YoutubeDownloader-windows.zip` | 압축 해제 후 `YoutubeDownloader.exe` 실행 |
            | macOS (Apple Silicon) | `YoutubeDownloader-macos-arm64.zip` | 압축 해제 후 `YoutubeDownloader.app` 실행 |
            | Linux (Ubuntu) | `YoutubeDownloader-linux.tar.gz` | `tar -xzf` 후 `./YoutubeDownloader` 실행 |

            > FFmpeg / AtomicParsley는 첫 실행 시 자동으로 다운로드됩니다.
            >
            > **macOS 주의:** 서명되지 않은 앱이라 처음 실행 시 차단될 수 있습니다.
            > 앱을 우클릭 → "열기"를 선택하거나, 터미널에서 `xattr -cr YoutubeDownloader.app` 후 실행하세요.
            >
            > **Windows 주의:** SmartScreen 경고가 뜨면 "추가 정보" → "실행"을 누르세요.
